<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- White background -->
  <rect width="200" height="200" rx="40" fill="#FFFFFF"/>

  <!-- Left person (voucher) — forest green -->
  <circle cx="58" cy="62" r="24" fill="#2D6A4F"/>
  <path d="M22 160 Q22 108 58 108 Q94 108 94 160 Z" fill="#2D6A4F"/>

  <!-- Pointing arm -->
  <path d="M90 122 Q107 112 114 112" stroke="#52B788" stroke-width="7" fill="none" stroke-linecap="round"/>
  <polygon points="114,112 104,104 104,120" fill="#52B788"/>

  <!-- Right person (vouched) — sage -->
  <circle cx="142" cy="62" r="24" fill="#52B788"/>
  <path d="M106 160 Q106 108 142 108 Q178 108 178 160 Z" fill="#52B788"/>

  <!-- Verified badge -->
  <circle cx="166" cy="36" r="17" fill="#2D6A4F"/>
  <polyline points="159,36 163,41 173,28" stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
