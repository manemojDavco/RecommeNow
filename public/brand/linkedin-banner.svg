  <polygon points="1448,272 1416,252 1416,292" fill="#D8F3DC"/>
  <!-- Right person -->
  <circle cx="1500" cy="148" r="72" fill="#D8F3DC"/>
  <path d="M1386 370 Q1386 258 1500 258 Q1614 258 1614 370 Z" fill="#D8F3DC"/>
  <!-- Badge -->
  <circle cx="1566" cy="84" r="44" fill="#F0EAD6"/>
