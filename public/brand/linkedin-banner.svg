  <polyline points="126,40 129,44 138,33" stroke="#F0EAD6" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark next to mark -->
  <text x="156" y="78" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="44" fill="#2D6A4F" letter-spacing="-1">Recomme<tspan fill="#52B788">Now</tspan></text>

  <!-- Main headline -->
  <text x="56" y="210" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="78" fill="#1B4332" letter-spacing="-2">Don't just apply.</text>
  <text x="56" y="306" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="78" fill="#2D6A4F" letter-spacing="-2">Get <tspan fill="#52B788">vouched.</tspan></text>

  <!-- URL -->
  <text x="56" y="360" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="500" font-size="24" fill="#95D5B2" letter-spacing="0">recommenow.com</text>
