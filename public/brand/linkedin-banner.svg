  <polyline points="1548,84 1558,95 1584,68" stroke="#2D6A4F" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Logo mark — top left -->
  <circle cx="60" cy="56" r="16" fill="#2D6A4F"/>
  <path d="M36 104 Q36 80 60 80 Q84 80 84 104 Z" fill="#2D6A4F"/>
  <path d="M82 87 Q94 80 100 80" stroke="#52B788" stroke-width="4" fill="none" stroke-linecap="round"/>
