<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- White background -->
  <rect width="1584" height="396" fill="#FFFFFF"/>

  <!-- Subtle green left accent bar -->
  <rect width="8" height="396" fill="#2D6A4F"/>

  <!-- Decorative large mark — right side, faded -->
